spring.application.name=erasm-backend

# ---------- MySQL ----------
spring.datasource.url=jdbc:mysql://localhost:3306/erasm_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---------- Server ----------
server.port=8081

# ---------- JWT ----------
# 256-bit secret, base64 - change this before deploying anywhere real
jwt.secret=ZXJhc20tc2VjcmV0LWtleS1mb3Ita2Vpbmctand0LXRva2Vucy1zZWN1cmU=
jwt.expiration.ms=86400000

# ---------- Logging ----------
logging.level.root=INFO
logging.level.com.erasm=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Also write logs to a file so you have persistent evidence for your
# documentation/screenshots deliverable (grep-able, easy to attach).
logging.file.name=logs/erasm.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
